version: '3.8'

services:
  ops-assistant:
    build: .
    container_name: ops-assistant
    ports:
      - "8000:8000"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://wiphack30qx5aw.cloudloka.com:8000/v1}
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen3-8B}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-120}
    volumes:
      - chroma_data:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:
